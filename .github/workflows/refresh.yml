name: Daily Stock & News Refresh

on:
  schedule:
    # Runs at 13:00 UTC = 15:00 CEST daily (matches Perplexity cron timing)
    - cron: '0 13 * * *'
  workflow_dispatch:  # Allow manual trigger from GitHub UI

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch fresh stock data
        run: python script/refresh_stocks.py

      - name: Commit updated stocks.json
        run: |
          git config user.name "CI Pulse Bot"
          git config user.email "ci-pulse-bot@users.noreply.github.com"
          git add stocks.json
          git diff --staged --quiet || git commit -m "chore: refresh stock data $(date -u +%Y-%m-%d)"

      - name: Push changes
        uses: ad-m/github-push-action@v0.8.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: master

      - name: Trigger Render deploy
        if: always()
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}" \
            && echo " — Render deploy triggered"
